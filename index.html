<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
  <title>Slim verzenden voor webshops — vanaf €3,50 per pakket | Sendwise</title>
  <meta name="description"
    content="Verzend pakketten vanaf €3,50 per stuk. Geen contracten, geen abonnementskosten en eerlijke all-in tarieven zonder verrassingen." />
  <script>
    (function () {
      var sharedImages = ["/sendwise-tekst-blauw.png", "/sendwise-tekst.png"];
      var criticalImagesByPath = {
        "/": ["/sendwise-hero-delivery-van.jpg"].concat(sharedImages),
        "/homepage2": ["/sendwise-hero-delivery-van.jpg"].concat(sharedImages),
        "/oplossingen/sendwise": ["/sendwise-platform-dashboard-hero.webp"].concat(sharedImages),
        "/oplossingen/pro": ["/sendwise-pro-dashboard-hero.webp"].concat(sharedImages),
        "/oplossingen/connect": ["/sendwise-connect-hero.jpg"].concat(sharedImages),
        "/voor-webshops": ["/sendwise-platform-hero.webp"].concat(sharedImages),
        "/voor-fulfilmentcenters": ["/fulfilmentcenters-hero.avif"].concat(sharedImages),
        "/prijzen": ["/profile-olivier.avif"].concat(sharedImages),
        "/contact": ["/contact-hero-olivier.avif"].concat(sharedImages),
        "/start-met-sendwise": ["/profile-founder-van.webp"].concat(sharedImages),
        "/blog/sendwise-goedgepickt": ["/sendwise-hero-picture.avif"].concat(sharedImages),
        "/integraties/woocommerce": ["/woocommerce-logo.webp"].concat(sharedImages),
        "/integraties/ccv-shop": ["/ccv-icon.svg"].concat(sharedImages),
      };

      var sources = criticalImagesByPath[window.location.pathname] || sharedImages;
      sources.forEach(function (src) {
        var link = document.createElement("link");
        link.rel = "preload";
        link.as = "image";
        link.href = src;
        link.setAttribute("fetchpriority", "high");
        document.head.appendChild(link);
      });
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
